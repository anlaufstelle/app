services:
  db:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  web:
    # Image-Tag via APP_VERSION parametrisieren (Refs #800), Fallback auf
    # den zuletzt gepinnten Release-Tag — Operator-Setups ohne explizite
    # .env bleiben reproduzierbar.
    image: ghcr.io/anlaufstelle/app:${APP_VERSION:-v0.10.2}
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: anlaufstelle.settings.prod
      POSTGRES_HOST: db
      CLAMAV_HOST: clamav
    volumes:
      # Persistenter Mount fuer MEDIA_ROOT (=/data/media) — verhindert
      # stillen Datenverlust bei docker compose pull && up -d.
      # Refs #720.
      - media:/data
    depends_on:
      db:
        condition: service_healthy
      clamav:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')\""]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - internal
      - frontend

  clamav:
    image: clamav/clamav:stable
    volumes:
      - clamav-db:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 300s
    restart: unless-stopped
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      # Access-Log persistent — Refs #801.
      - caddy_logs:/var/log/caddy
    env_file: .env
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  caddy_logs:
  clamav-db:
  media:

networks:
  internal:
    internal: true
  frontend:
