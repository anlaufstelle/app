services:
  db:
    image: postgres:16-alpine
    # KEIN env_file: .env hier — der db-Container nutzt
    # POSTGRES_USER=postgres als Bootstrap-Superuser (Postgres-Image-
    # Convention). Der App-User (NOSUPERUSER, NOBYPASSRLS) und der
    # Admin-User (NOSUPERUSER, BYPASSRLS) werden im Init-Script
    # ``deploy/postgres-init/01-app-role.sh`` angelegt. Refs #902 /
    # ADR-005, ADR-017.
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_BOOTSTRAP_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      APP_DB_USER: ${POSTGRES_USER}
      APP_DB_PASSWORD: ${POSTGRES_PASSWORD}
      ADMIN_DB_USER: ${POSTGRES_ADMIN_USER}
      ADMIN_DB_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  web:
    # Image-Tag via APP_VERSION parametrisieren (Refs #800), Fallback auf
    # den zuletzt gepinnten Release-Tag — Operator-Setups ohne explizite
    # .env bleiben reproduzierbar.
    image: ghcr.io/anlaufstelle/app:${APP_VERSION:-v0.10.2}
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: anlaufstelle.settings.prod
      POSTGRES_HOST: db
      CLAMAV_HOST: clamav
      # Refs #1017: Stabiler App-Rollenname für check_db_roles — der Migrate-Job
      # (docker-migrate.sh) überschreibt POSTGRES_USER auf die Admin-Rolle; ohne
      # diese Variable prüfte das Rollen-Gate fälschlich die Admin- statt App-Rolle.
      POSTGRES_APP_USER: ${POSTGRES_USER}
    volumes:
      # Persistenter Mount fuer MEDIA_ROOT (=/data/media) — verhindert
      # stillen Datenverlust bei docker compose pull && up -d.
      # Refs #720.
      - media:/data
    depends_on:
      db:
        condition: service_healthy
      clamav:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')\""]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - internal
      - frontend

  clamav:
    image: clamav/clamav:stable
    volumes:
      - clamav-db:/var/lib/clamav
    # Refs #1006: Scan-Pfad-Vertrag. Die App scannt über pyclamd
    # ClamdNetworkSocket per TCP (CLAMAV_HOST:CLAMAV_PORT, Default
    # clamav:3310, siehe core/services/file_vault/virus_scan.py). Das
    # offizielle clamav/clamav:stable-Image aktiviert in seiner gebündelten
    # clamd.conf "TCPSocket 3310" by Default — clamd lauscht also auf
    # 0.0.0.0:3310. expose macht diesen internen Vertrag explizit/gepinnt.
    expose:
      - "3310"
    # Refs #938: Healthcheck via clamdscan --version (Smoke-Test des Binary)
    # statt clamdcheck.sh — robust gegen die lange Signatur-Lade-Phase
    # (start_period), in der ein Socket-Probe sonst transient unhealthy meldet.
    healthcheck:
      test: ["CMD", "clamdscan", "--version"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 300s
    restart: unless-stopped
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      # Access-Log persistent — Refs #801.
      - caddy_logs:/var/log/caddy
    env_file: .env
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  caddy_logs:
  clamav-db:
  media:

networks:
  internal:
    internal: true
  frontend:
