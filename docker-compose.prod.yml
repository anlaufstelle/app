services:
  db:
    image: postgres:18-alpine@sha256:1b1689b20d16a014a3d195653381cf2caa75a41a92d93b255a9d6ea29fd353aa
    # Container-Runtime-Hardening (Refs #1374): kein Privilege-Escalation,
    # cap_drop ALL. Postgres startet als root (chmod/chown Datadir + Socket,
    # dann Drop auf postgres), daher CHOWN/FOWNER/SETUID/SETGID zurueck
    # DAC_OVERRIDE ist noetig, damit root das BESTEHENDE PGDATA (mode 0700,
    # postgres-uid) beim Entrypoint-``find`` traversieren kann — ohne bricht
    # ein Redeploy auf vorhandenem Datadir mit "Permission denied" (ein
    # Fresh-Init-Volume verdeckt das). Kein read_only: Datadir
    # + Unix-Socket sind Schreibpfade.
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    pids_limit: 512
    mem_limit: 2g
    # KEIN env_file: .env hier — der db-Container nutzt
    # POSTGRES_USER=postgres als Bootstrap-Superuser (Postgres-Image-
    # Convention). Der App-User (NOSUPERUSER, NOBYPASSRLS) und der
    # Admin-User (NOSUPERUSER, BYPASSRLS) werden im Init-Script
    # ``deploy/postgres-init/01-app-role.sh`` angelegt. Refs #902 /
    # ADR-005, ADR-017.
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_BOOTSTRAP_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      APP_DB_USER: ${POSTGRES_USER}
      APP_DB_PASSWORD: ${POSTGRES_PASSWORD}
      ADMIN_DB_USER: ${POSTGRES_ADMIN_USER}
      ADMIN_DB_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
    volumes:
      # PG18-Image: PGDATA=/var/lib/postgresql/18/docker, VOLUME-Deklaration
      # /var/lib/postgresql — Mount aufs Elternverzeichnis, nicht .../data
      # (PG16-Layout), sonst landen die Daten in einem anonymen Volume.
      # Migrationspfad 16→18 (dump/restore + Rollback): docs/ops-runbook.md.
      # Refs #1039.
      - pgdata:/var/lib/postgresql
      - ./deploy/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  web:
    # Migrationen laufen NICHT im Entrypoint, sondern als separater One-Shot-Job
    # vor dem Rolling-Restart (``docker-migrate.sh``; Refs #802/C-34). Der
    # Entrypoint macht nur ``collectstatic`` + ``gunicorn``. Ablauf + Aufruf:
    # docs/ops-runbook.md §1.2.
    # Image-Tag via APP_VERSION parametrisieren (Refs #800), Fallback auf
    # den zuletzt gepinnten Release-Tag — Operator-Setups ohne explizite
    # .env bleiben reproduzierbar.
    image: ghcr.io/anlaufstelle/app:${APP_VERSION:-v0.20.0}
    # Container-Runtime-Hardening (Refs #1374): kein Privilege-Escalation,
    # cap_drop ALL (web laeuft als non-root appuser auf :8000, braucht keine
    # Caps). read_only-Root-FS mit definiertem Schreib-Scratch: /tmp
    # (Django-Upload-Tempfiles > 2,5 MB + Gunicorn-Worker-Heartbeat) und
    # /app/staticfiles (Entrypoint-collectstatic + WhiteNoise-Manifest);
    # MEDIA_ROOT liegt auf dem beschreibbaren media-Volume.
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      # mode 1777: der non-root appuser (uid 1000) muss das
      # Entrypoint-collectstatic-Manifest unter read_only schreiben koennen
      # (Docker-Default-tmpfs waere root:0755 -> Permission denied). Refs #1374.
      - /app/staticfiles:mode=1777
      # Gunicorn legt seinen Control-Server-Socket unter $HOME/.gunicorn ab;
      # unter read_only sonst "Read-only file system". Refs #1374.
      - /home/appuser/.gunicorn:mode=1777
      # WeasyPrint/fontconfig legt beim ersten PDF-Render seinen Cache unter
      # $HOME/.cache ab; unter read_only sonst "no writable cache directory"
      # (Fehler-Logs + langsamer Render). Refs #1374.
      - /home/appuser/.cache:mode=1777
    pids_limit: 512
    mem_limit: 2g
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: anlaufstelle.settings.prod
      POSTGRES_HOST: db
      CLAMAV_HOST: clamav
      # Refs #1017: Stabiler App-Rollenname für check_db_roles — der Migrate-Job
      # (docker-migrate.sh) überschreibt POSTGRES_USER auf die Admin-Rolle; ohne
      # diese Variable prüfte das Rollen-Gate fälschlich die Admin- statt App-Rolle.
      POSTGRES_APP_USER: ${POSTGRES_USER}
    volumes:
      # Persistenter Mount fuer MEDIA_ROOT (=/data/media) — verhindert
      # stillen Datenverlust bei docker compose pull && up -d.
      # Refs #720.
      - media:/data
    depends_on:
      db:
        condition: service_healthy
      clamav:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')\""]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - internal
      - frontend

  clamav:
    image: clamav/clamav:stable@sha256:6f4a9e7d616ffc8d1070200fe35ac860735fdd522161a1043f94856e6ee13c28
    # Container-Runtime-Hardening (Refs #1374): kein Privilege-Escalation,
    # cap_drop ALL. clamav startet als root und dropt auf den clamav-User;
    # CHOWN/FOWNER/SETUID/SETGID + DAC_OVERRIDE zurueck (ohne DAC_OVERRIDE
    # scheitert das Oeffnen von /var/log/clamav/*.log -> Init-Fehler, empirisch
    # belegt). Kein read_only: freshclam schreibt Signatur-Updates.
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    pids_limit: 512
    mem_limit: 3g
    volumes:
      - clamav-db:/var/lib/clamav
    # Refs #1006: Scan-Pfad-Vertrag. Die App scannt über pyclamd
    # ClamdNetworkSocket per TCP (CLAMAV_HOST:CLAMAV_PORT, Default
    # clamav:3310, siehe core/services/file_vault/virus_scan.py). Das
    # offizielle clamav/clamav:stable-Image aktiviert in seiner gebündelten
    # clamd.conf "TCPSocket 3310" by Default — clamd lauscht also auf
    # 0.0.0.0:3310. expose macht diesen internen Vertrag explizit/gepinnt.
    expose:
      - "3310"
    # Refs #938: Healthcheck via clamdscan --version (Smoke-Test des Binary)
    # statt clamdcheck.sh — robust gegen die lange Signatur-Lade-Phase
    # (start_period), in der ein Socket-Probe sonst transient unhealthy meldet.
    healthcheck:
      test: ["CMD", "clamdscan", "--version"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 300s
    restart: unless-stopped
    networks:
      - internal

  caddy:
    image: caddy:2-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
    # Container-Runtime-Hardening (Refs #1374): kein Privilege-Escalation,
    # cap_drop ALL bis auf NET_BIND_SERVICE (Bind auf 80/443; das Caddy-Binary
    # traegt cap_net_bind_service als File-Cap, die no-new-privileges sonst
    # beim exec blockt). read_only-Root-FS; beschreibbar via Volumes bleiben
    # /data, /config (Zertifikate/State) und /var/log/caddy (Access-Log).
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      # Caddys interne PKI/CA schreibt Truststore-Tempfiles nach /tmp; unter
      # read_only sonst "read-only file system". Refs #1374.
      - /tmp
    pids_limit: 256
    mem_limit: 512m
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      # Access-Log persistent — Refs #801.
      - caddy_logs:/var/log/caddy
    # KEIN env_file: .env hier — Caddy braucht keine App-/DB-/Krypto-Secrets
    # (Blast-Radius). Nur die vom Caddyfile tatsaechlich referenzierten
    # Variablen als Passthrough (DOMAIN, X_ROBOTS_TAG); leer/undefiniert
    # bleibt unset, damit Caddys eigener `{$X_ROBOTS_TAG:default}` greift.
    # Refs #1370.
    environment:
      - DOMAIN
      - X_ROBOTS_TAG
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  caddy_logs:
  clamav-db:
  media:

networks:
  internal:
    internal: true
  frontend:
