name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 5 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    # CodeQL ist auf privaten Repos nur mit GitHub Advanced Security verfügbar.
    # Im Dev-Repo (anlaufstelle/app, privat) und im Stage-Repo
    # (anlaufstelle/stage, privat) wird der Job geskippt; im App-Repo
    # (anlaufstelle/app, public) läuft er kostenfrei und meldet Findings
    # ans Security-Tab. Refs Issue #687.
    if: github.event.repository.private == false
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
      - uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
