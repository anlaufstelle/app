name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 5 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    # CodeQL ist auf privaten Repos nur mit GitHub Advanced Security verfügbar.
    # Im Dev-Repo (anlaufstelle/app, privat) und im Stage-Repo
    # (anlaufstelle/stage, privat) wird der Job geskippt; im App-Repo
    # (anlaufstelle/app, public) läuft er kostenfrei und meldet Findings
    # ans Security-Tab. Refs Issue #687.
    if: github.event.repository.private == false
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
      - uses: github/codeql-action/autobuild@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
      - uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        with:
          category: "/language:${{ matrix.language }}"
