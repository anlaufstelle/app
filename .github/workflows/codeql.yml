name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 5 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    # CodeQL ist auf privaten Repos nur mit GitHub Advanced Security verfügbar.
    # Im Dev-Repo (anlaufstelle/app, privat) und im Stage-Repo
    # (anlaufstelle/stage, privat) wird der Job geskippt; im App-Repo
    # (anlaufstelle/app, public) läuft er kostenfrei und meldet Findings
    # ans Security-Tab. Refs Issue #687.
    if: github.event.repository.private == false
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4.36.3
        with:
          languages: ${{ matrix.language }}
          # python + javascript sind interpretiert -> kein Build noetig; der
          # frühere autobuild-Step schlug daher fehl ("unable to build").
          build-mode: none
          queries: security-and-quality
      # Alle codeql-action-Steps MUESSEN auf dieselbe Version gepinnt sein
      # (Monorepo, gleiche SHA) -- gemischte Pins (init 4.36.3 / analyze 4.36.2)
      # brechen mit "config version X, running version Y". Kein autobuild-Step
      # bei build-mode: none.
      - uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4.36.3
        with:
          category: "/language:${{ matrix.language }}"
