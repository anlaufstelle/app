name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install ruff==0.15.11
      - run: ruff check src/
      - run: ruff format --check src/

  licenses:
    # Refs #839: pip-licenses prueft jede installierte Dependency gegen die
    # AGPLv3-kompatible Allowlist in scripts/check_licenses.py.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pip install pip-licenses
      - run: python scripts/check_licenses.py
      - run: pip-licenses --format=markdown --with-system --with-urls > thirdparty-licenses.md
      - uses: actions/upload-artifact@v4
        with:
          name: thirdparty-licenses
          path: thirdparty-licenses.md

  translation-versions:
    # Refs #832: EN-Translations duerfen nicht mehr als 2 Minor-Releases
    # hinter pyproject.toml zuruckliegen.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python scripts/check_translation_versions.py

  typecheck:
    # Refs #741 / #713 (Audit-Massnahme #37): mypy auf core/services
    # inkrementell. Eigener Job, damit lint + typecheck parallel laufen
    # und ein Type-Fehler die ruff-Resultate nicht versteckt.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pip install "mypy>=1.20" "django-stubs[compatible-mypy]>=6.0"
      - run: mypy src/core/services src/core/forms
