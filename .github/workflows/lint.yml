name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
      # Refs #819: Ruff-Version aus dem Lockfile ziehen, damit lokale
      # ``make lint`` und CI dieselbe Version nutzen.
      - run: pip install -r requirements-dev.txt
      - run: ruff check src/
      - run: ruff format --check src/

  licenses:
    # Refs #839: pip-licenses prueft jede installierte Dependency gegen die
    # AGPLv3-kompatible Allowlist in scripts/check_licenses.py.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pip install pip-licenses
      - run: python scripts/check_licenses.py
      - run: pip-licenses --format=markdown --with-system --with-urls > thirdparty-licenses.md
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: thirdparty-licenses
          path: thirdparty-licenses.md

  translation-versions:
    # Refs #832: EN-Translations duerfen nicht mehr als 2 Minor-Releases
    # hinter pyproject.toml zuruckliegen.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"
      - run: python scripts/check_translation_versions.py

  translations-coverage:
    # Refs #813 (C-46): Wachhund gegen fuzzy/untranslated-Regression in
    # de.po + en.po. Faellt wenn Werte oberhalb der Baseline klettern.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"
      - run: sudo apt-get update && sudo apt-get install -y gettext
      - run: python scripts/check_translations.py

  typecheck:
    # Refs #741 / #713 (Audit-Massnahme #37): mypy auf core/services
    # inkrementell. Eigener Job, damit lint + typecheck parallel laufen
    # und ein Type-Fehler die ruff-Resultate nicht versteckt.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pip install "mypy>=1.20" "django-stubs[compatible-mypy]>=6.0"
      - run: mypy src/core/services src/core/forms
