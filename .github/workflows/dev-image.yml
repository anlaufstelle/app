name: Dev-Image

# Baut auf jedem Push gegen main das Container-Image fuer dev.anlaufstelle.app
#. Tags:
#   - :main            (rollendes dev-Tag, wird vom Server-Compose gepullt)
#   - :main-<sha>      (rueckverfolgbarer Pin, fuer Rollback)
#
# Nur amd64 — der dev-Server ist Hetzner CX22 (amd64). Multi-Arch macht
# weiterhin release.yml fuer offizielle v*-Tags.
#
# Sicherheitsnote: dieser Workflow nutzt ausschliesslich vertrauenswuerdige
# github.*-Kontexte (repository, sha, actor, ref), keine user-controlled
# Eingaben wie issue.title oder commit.message in run-Steps.

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "CHANGELOG.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"
  workflow_dispatch:

concurrency:
  group: dev-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository }}:main
            ghcr.io/${{ github.repository }}:main-${{ github.sha }}
          build-args: |
            DJANGO_SECRET_KEY=build-only-collectstatic
            APP_VERSION=main-${{ github.sha }}
