name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: anlaufstelle
          POSTGRES_USER: anlaufstelle
          POSTGRES_PASSWORD: anlaufstelle
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U anlaufstelle"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements-dev.txt
      # Refs #922 / #923: Drift-Check vor den Tests. Faillt, wenn die
      # Manual-Test-Matrix Test-Files referenziert, die nicht existieren.
      - name: Verify manual-test-matrix drift
        run: python scripts/verify_test_matrix_drift.py
      # Refs #823 (C-56): --cov-fail-under erzwingt die Coverage-Schwelle.
      # Stand 2026-05-20 (#945/#949): 96 % erreicht durch gezielte
      # Top-Lücken-Tests (Buckets A+B+C+D). Folge-PRs dürfen den Wert anheben,
      # aber nicht senken.
      - run: python -m pytest -m "not e2e" --ignore=src/tests/e2e -n auto --cov=core --cov-report=term-missing --cov-report=xml --cov-report=html --cov-fail-under=96
        env:
          POSTGRES_HOST: localhost
          ENCRYPTION_KEY: P2N8yY4cVt1BmHZSvNrkSfkDYIJwEFcftRmO4bE-nZM=
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          retention-days: 14

  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: anlaufstelle
          POSTGRES_USER: anlaufstelle
          POSTGRES_PASSWORD: anlaufstelle
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U anlaufstelle"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - run: cd src && python manage.py check --settings=anlaufstelle.settings.dev
        env:
          POSTGRES_HOST: localhost
      - run: cd src && python manage.py makemigrations --check --dry-run --settings=anlaufstelle.settings.dev
        env:
          POSTGRES_HOST: localhost
      - run: cd src && python manage.py check --deploy --settings=anlaufstelle.settings.prod
        env:
          POSTGRES_HOST: localhost
          DJANGO_SECRET_KEY: ci-check-only-not-a-real-secret
          ENCRYPTION_KEY: P2N8yY4cVt1BmHZSvNrkSfkDYIJwEFcftRmO4bE-nZM=
          ALLOWED_HOSTS: localhost

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install pip-audit
      - run: pip-audit -r requirements.txt
      - name: SBOM (CycloneDX) generieren
        run: pip-audit -r requirements.txt --format cyclonedx-json -o sbom.json
      - name: SBOM als Artefakt
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom-cyclonedx
          path: sbom.json
          retention-days: 90

  lock-check:
    # Stellt sicher, dass requirements*.txt (Lock-Files) synchron zu
    # requirements*.in sind. Schlägt fehl, wenn pip-compile Drift erkennt.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install pip-tools
      - name: Verify requirements.txt is up to date
        run: |
          cp requirements.txt requirements.txt.bak
          pip-compile --quiet --no-strip-extras --resolver=backtracking \
            --output-file=requirements.txt requirements.in
          if ! diff -u requirements.txt.bak requirements.txt; then
            echo "::error::requirements.txt ist nicht aktuell — 'make deps-lock' ausführen."
            exit 1
          fi
      - name: Verify requirements-dev.txt is up to date
        run: |
          cp requirements-dev.txt requirements-dev.txt.bak
          pip-compile --quiet --no-strip-extras --resolver=backtracking \
            --output-file=requirements-dev.txt requirements-dev.in
          if ! diff -u requirements-dev.txt.bak requirements-dev.txt; then
            echo "::error::requirements-dev.txt ist nicht aktuell — 'make deps-lock' ausführen."
            exit 1
          fi
