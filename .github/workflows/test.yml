name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: anlaufstelle
          POSTGRES_USER: anlaufstelle
          POSTGRES_PASSWORD: anlaufstelle
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U anlaufstelle"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest -m "not e2e" --ignore=src/tests/e2e -n auto --cov=core --cov-report=term-missing --cov-report=xml --cov-report=html
        env:
          POSTGRES_HOST: localhost
          ENCRYPTION_KEY: P2N8yY4cVt1BmHZSvNrkSfkDYIJwEFcftRmO4bE-nZM=
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          retention-days: 14

  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: anlaufstelle
          POSTGRES_USER: anlaufstelle
          POSTGRES_PASSWORD: anlaufstelle
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U anlaufstelle"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - run: cd src && python manage.py check --settings=anlaufstelle.settings.dev
        env:
          POSTGRES_HOST: localhost
      - run: cd src && python manage.py makemigrations --check --dry-run --settings=anlaufstelle.settings.dev
        env:
          POSTGRES_HOST: localhost
      - run: cd src && python manage.py check --deploy --settings=anlaufstelle.settings.prod
        env:
          POSTGRES_HOST: localhost
          SECRET_KEY: ci-check-only-not-a-real-secret
          ENCRYPTION_KEY: P2N8yY4cVt1BmHZSvNrkSfkDYIJwEFcftRmO4bE-nZM=
          ALLOWED_HOSTS: localhost

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install pip-audit
      - run: pip-audit -r requirements.txt

  lock-check:
    # Stellt sicher, dass requirements*.txt (Lock-Files) synchron zu
    # requirements*.in sind. Schlägt fehl, wenn pip-compile Drift erkennt.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install pip-tools
      - name: Verify requirements.txt is up to date
        run: |
          cp requirements.txt requirements.txt.bak
          pip-compile --quiet --no-strip-extras --resolver=backtracking \
            --output-file=requirements.txt requirements.in
          if ! diff -u requirements.txt.bak requirements.txt; then
            echo "::error::requirements.txt ist nicht aktuell — 'make deps-lock' ausführen."
            exit 1
          fi
      - name: Verify requirements-dev.txt is up to date
        run: |
          cp requirements-dev.txt requirements-dev.txt.bak
          pip-compile --quiet --no-strip-extras --resolver=backtracking \
            --output-file=requirements-dev.txt requirements-dev.in
          if ! diff -u requirements-dev.txt.bak requirements-dev.txt; then
            echo "::error::requirements-dev.txt ist nicht aktuell — 'make deps-lock' ausführen."
            exit 1
          fi
