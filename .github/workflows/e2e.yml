name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-e2e:
    runs-on: ubuntu-latest
    # Ohne dieses Limit laeuft ein haengender Job bis in GitHubs 6-Stunden-Default
    # (v0.22.0: 1h22m, bis er von Hand abgebrochen wurde) und brennt Actions-Minuten.
    # 45 statt 30: seriell braucht die Suite lokal 15-16 min auf 8 Kernen, auf einem
    # 2-Kern-Runner plus Setup eher ~25 -- das Limit soll Haenger abraeumen, nicht
    # langsame Laeufe abschneiden.
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: anlaufstelle
          POSTGRES_USER: anlaufstelle
          POSTGRES_PASSWORD: anlaufstelle
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U anlaufstelle"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.14"
          cache: pip
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "24"
          cache: npm
      - run: pip install -r requirements-dev.txt
      - run: npm ci
      - run: npx @tailwindcss/cli -i src/static/css/input.css -o src/static/css/styles.css --minify
      - run: cd src && python manage.py collectstatic --noinput
        env:
          DJANGO_SETTINGS_MODULE: anlaufstelle.settings.e2e
          POSTGRES_HOST: localhost
          ENCRYPTION_KEY: P2N8yY4cVt1BmHZSvNrkSfkDYIJwEFcftRmO4bE-nZM=
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements-dev.txt') }}
      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
      - name: Install Playwright system deps only (cache hit)
        run: python -m playwright install-deps chromium
        if: steps.playwright-cache.outputs.cache-hit == 'true'
      # Seriell (kein -n 2): Die Projekt-Konvention ist "E2E seriell laufen" --
      # parallele Playwright-Laeufe auf ressourcenknappen Runnern sind instabil,
      # und das Release-Gate (make test-e2e) faehrt aus demselben Grund seriell.
      # Belegt bei v0.22.0: mit -n 2 auf 2 Kernen haengt der Passkey-Roundtrip
      # dauerhaft (Chromium stirbt unter CPU-Druck weg, danach dreht die
      # Playwright-Sync-API -- --timeout greift dort NICHT); seriell und auf
      # 8 Kernen laeuft derselbe Test gruen durch. Zusaetzlich fiel unter -n 2 ein
      # Locator-Race in test_file_vault auf. Beides Test-Defekte, nicht Produkt.
      - run: python -m pytest -m "e2e" --timeout=120
        env:
          DJANGO_SETTINGS_MODULE: anlaufstelle.settings.e2e
          POSTGRES_HOST: localhost
          ENCRYPTION_KEY: P2N8yY4cVt1BmHZSvNrkSfkDYIJwEFcftRmO4bE-nZM=
