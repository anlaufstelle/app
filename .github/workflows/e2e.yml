name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: anlaufstelle
          POSTGRES_USER: anlaufstelle
          POSTGRES_PASSWORD: anlaufstelle
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U anlaufstelle"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: pip install -r requirements-dev.txt
      - run: npm ci
      - run: npx tailwindcss -i src/static/css/input.css -o src/static/css/styles.css --minify
      - run: cd src && python manage.py collectstatic --noinput
        env:
          DJANGO_SETTINGS_MODULE: anlaufstelle.settings.e2e
          POSTGRES_HOST: localhost
          ENCRYPTION_KEY: P2N8yY4cVt1BmHZSvNrkSfkDYIJwEFcftRmO4bE-nZM=
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements-dev.txt') }}
      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
      - name: Install Playwright system deps only (cache hit)
        run: python -m playwright install-deps chromium
        if: steps.playwright-cache.outputs.cache-hit == 'true'
      - run: python -m pytest -m "e2e" --timeout=120 -n 2 --dist loadfile
        env:
          DJANGO_SETTINGS_MODULE: anlaufstelle.settings.e2e
          POSTGRES_HOST: localhost
          ENCRYPTION_KEY: P2N8yY4cVt1BmHZSvNrkSfkDYIJwEFcftRmO4bE-nZM=
