name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: anlaufstelle
          POSTGRES_USER: anlaufstelle
          POSTGRES_PASSWORD: anlaufstelle
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U anlaufstelle"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "24"
          cache: npm
      - run: pip install -r requirements-dev.txt
      - run: npm ci
      - run: npx @tailwindcss/cli -i src/static/css/input.css -o src/static/css/styles.css --minify
      - run: cd src && python manage.py collectstatic --noinput
        env:
          DJANGO_SETTINGS_MODULE: anlaufstelle.settings.e2e
          POSTGRES_HOST: localhost
          ENCRYPTION_KEY: P2N8yY4cVt1BmHZSvNrkSfkDYIJwEFcftRmO4bE-nZM=
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements-dev.txt') }}
      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
      - name: Install Playwright system deps only (cache hit)
        run: python -m playwright install-deps chromium
        if: steps.playwright-cache.outputs.cache-hit == 'true'
      - run: python -m pytest -m "e2e" --timeout=120 -n 2 --dist loadfile
        env:
          DJANGO_SETTINGS_MODULE: anlaufstelle.settings.e2e
          POSTGRES_HOST: localhost
          ENCRYPTION_KEY: P2N8yY4cVt1BmHZSvNrkSfkDYIJwEFcftRmO4bE-nZM=
