name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Set up QEMU (für Multi-Arch-Emulation)
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          push: true
          # Multi-Arch: amd64 (Server) + arm64 (Raspberry, Apple Silicon)
          platforms: linux/amd64,linux/arm64
          # GitHub Actions Cache spart Layer-Rebuilds zwischen Releases
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
          build-args: |
            DJANGO_SECRET_KEY=build-only-collectstatic
            APP_VERSION=${{ github.ref_name }}
      # Refs #886: GHCR-Pakete sind by-default privat, auch wenn das Source-Repo
      # public ist. Dieser Step setzt die Package-Visibility nach jedem Push
      # idempotent auf public — aber nur, wenn das Repo selbst public ist
      # (so läuft der Step im privaten Dev-Repo anlaufstelle/app nicht
      # versehentlich). Erfordert Repo-Secret GHCR_VISIBILITY_TOKEN
      # (PAT classic mit admin:packages-Scope; write:packages reicht nicht).
      - name: Ensure package visibility is public
        # Optional: scheitert leise, wenn das Secret GHCR_VISIBILITY_TOKEN
        # noch nicht gesetzt ist (Refs #886). Image-Push selbst ist davon
        # unabhängig — Visibility kann manuell über die Package-Settings
        # geflippt werden, solange dieser Step nicht greift.
        continue-on-error: true
        if: github.event.repository.private == false
        env:
          GH_TOKEN: ${{ secrets.GHCR_VISIBILITY_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          ORG="${REPOSITORY%%/*}"
          PKG="${REPOSITORY##*/}"
          gh api -X PATCH \
            -H "Accept: application/vnd.github+json" \
            "/orgs/${ORG}/packages/container/${PKG}" \
            -f visibility=public
