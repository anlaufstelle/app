{% load i18n %}
{% if recent_clients %}
<div class="grid grid-cols-2 gap-2">
    {% for visit in recent_clients %}
    <a href="{% url 'core:client_detail' pk=visit.client.pk %}" class="flex items-center p-3 rounded-md hover:bg-gray-50 border border-gray-200">
        <div class="flex-1 min-w-0">
            <p class="text-sm font-medium text-gray-900 truncate">{{ visit.client.pseudonym }}</p>
            <p class="text-xs text-gray-500">{{ visit.visited_at|date:"d.m.Y" }}</p>
        </div>
        {% if visit.is_favorite %}
        <svg class="w-4 h-4 text-yellow-400 flex-shrink-0 ml-2" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
        {% endif %}
    </a>
    {% endfor %}
</div>
{% else %}
<p class="text-sm text-gray-500 text-center py-4">{% trans "Noch keine besuchten Klientel" %}</p>
{% endif %}
