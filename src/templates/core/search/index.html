{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Suche" %} – Anlaufstelle{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold mb-6">{% trans "Suche" %}</h1>

<div class="mb-6">
    <input type="text"
           name="q"
           value="{{ q }}"
           placeholder="{% trans 'Pseudonym oder Suchbegriff eingeben...' %}"
           aria-label="{% trans 'Suchfeld' %}"
           class="w-full sm:max-w-lg border border-gray-300 rounded-md px-4 py-3 text-sm"
           autofocus
           hx-get="{% url 'core:search' %}"
           hx-trigger="keyup changed delay:300ms"
           hx-target="#search-results"
    >
</div>

<div id="search-results">
    {% include "core/search/partials/results.html" %}
</div>
{% endblock %}
