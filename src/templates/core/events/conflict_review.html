{% extends "base.html" %}
{% load i18n static %}

{% block title %}{% trans "Konflikt auflösen" %} – Anlaufstelle{% endblock %}

{% block content %}
<div x-data="conflictResolver('{{ event_pk|escapejs }}')" x-init="load()"
     data-testid="conflict-resolver-view" class="space-y-6">

    <div class="flex items-center space-x-2">
        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800">
            {% trans "Konflikt" %}
        </span>
        <span class="text-sm text-gray-600" x-text="documentTypeName"></span>
    </div>

    <template x-if="loading">
        <div class="py-8 text-center text-gray-500" data-testid="conflict-loading">
            {% trans "Konflikt wird geladen..." %}
        </div>
    </template>

    <template x-if="!loading && error">
        <div class="bg-yellow-50 border border-yellow-200 rounded-md p-4" data-testid="conflict-error">
            <p class="text-sm text-yellow-900" x-text="error"></p>
            <a href="{% url 'core:offline_conflict_list' %}" class="mt-2 inline-flex items-center text-sm text-indigo-600 hover:underline">
                {% trans "Zur Konflikt-Übersicht" %}
            </a>
        </div>
    </template>

    <template x-if="!loading && !error && resolved">
        <div class="bg-green-50 border border-green-200 rounded-md p-4" data-testid="conflict-resolved">
            <p class="text-sm text-green-900">{% trans "Konflikt aufgelöst." %}</p>
            <a href="{% url 'core:offline_conflict_list' %}" class="mt-2 inline-flex items-center text-sm text-indigo-600 hover:underline">
                {% trans "Zur Konflikt-Übersicht" %}
            </a>
        </div>
    </template>

    <template x-if="!loading && !error && !resolved">
        <div class="space-y-6">
            <div class="bg-white border border-gray-200 rounded-md overflow-hidden">
                <div class="px-4 py-3 border-b border-gray-200 bg-gray-50">
                    <h2 class="text-sm font-semibold text-gray-900">{% trans "Feldweise Gegenüberstellung" %}</h2>
                    <p class="mt-1 text-xs text-gray-500">{% trans "Vergleichen Sie Ihre lokale Version mit dem aktuellen Server-Stand." %}</p>
                </div>
                <table class="min-w-full text-sm" data-testid="conflict-diff-table">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-2 text-left font-medium text-gray-500 uppercase text-xs tracking-wider">{% trans "Feld" %}</th>
                            <th class="px-4 py-2 text-left font-medium text-gray-500 uppercase text-xs tracking-wider">{% trans "Meine Version" %}</th>
                            <th class="px-4 py-2 text-left font-medium text-gray-500 uppercase text-xs tracking-wider">{% trans "Server-Version" %}</th>
                            <th class="px-4 py-2 text-left font-medium text-gray-500 uppercase text-xs tracking-wider">{% trans "Auswahl" %}</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200">
                        <template x-for="key in diffKeys" :key="key">
                            <tr :class="{ 'bg-yellow-50': localData[key] !== serverData[key] }" data-testid="conflict-row">
                                <td class="px-4 py-2 font-mono text-xs text-gray-600" x-text="key"></td>
                                <td class="px-4 py-2 text-gray-900 whitespace-pre-wrap" x-text="formatValue(localData[key])" data-testid="conflict-local"></td>
                                <td class="px-4 py-2 text-gray-900 whitespace-pre-wrap" x-text="formatValue(serverData[key])" data-testid="conflict-server"></td>
                                <td class="px-4 py-2">
                                    <select x-model="perFieldChoice[key]" class="text-xs rounded border-gray-300" data-testid="conflict-choice">
                                        <option value="local">{% trans "Meine" %}</option>
                                        <option value="server">{% trans "Server" %}</option>
                                    </select>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>

            <div class="flex flex-wrap gap-2">
                <button type="button" @click="keepLocal()" :disabled="resolving"
                        class="inline-flex items-center px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-md hover:bg-indigo-700 disabled:opacity-60"
                        data-testid="conflict-keep-local">
                    {% trans "Meine Version behalten" %}
                </button>
                <button type="button" @click="keepServer()" :disabled="resolving"
                        class="inline-flex items-center px-4 py-2 bg-white border border-gray-300 text-gray-700 text-sm font-medium rounded-md hover:bg-gray-50 disabled:opacity-60"
                        data-testid="conflict-keep-server">
                    {% trans "Server-Version übernehmen" %}
                </button>
                <button type="button" @click="keepMerged()" :disabled="resolving"
                        class="inline-flex items-center px-4 py-2 bg-amber-600 text-white text-sm font-medium rounded-md hover:bg-amber-700 disabled:opacity-60"
                        data-testid="conflict-merge">
                    {% trans "Manuell mergen" %}
                </button>
            </div>
        </div>
    </template>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/conflict-resolver.js' %}"></script>
{% endblock %}
