{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Klientel" %} – Anlaufstelle{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold">{% trans "Klientel" %}</h1>
    <div class="hidden md:block">
        <a href="{% url 'core:client_create' %}" class="inline-flex items-center px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-md hover:bg-indigo-700">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            {% trans "Neues Klientel" %}
        </a>
    </div>
</div>

{# Suchleiste + Filter #}
<div class="mb-4 flex flex-col sm:flex-row gap-3 no-print" data-filter-persist>
    <input type="text"
           name="q"
           value="{{ q }}"
           placeholder="{% trans 'Pseudonym suchen...' %}"
           class="flex-1 border border-gray-300 rounded-md px-3 py-2 text-sm"
           hx-get="{% url 'core:client_list' %}"
           hx-trigger="keyup changed delay:300ms"
           hx-target="#client-table"
           hx-include="[name='stage'],[name='age']"
    >
    <select name="stage" aria-label="{% trans 'Kontaktstufe filtern' %}" class="border border-gray-300 rounded-md px-3 py-2 text-sm"
            hx-get="{% url 'core:client_list' %}"
            hx-trigger="change"
            hx-target="#client-table"
            hx-include="[name='q'],[name='age']">
        <option value="">{% trans "Alle Stufen" %}</option>
        {% for value, label in contact_stages %}
        <option value="{{ value }}" {% if value == selected_stage %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
    </select>
    <select name="age" aria-label="{% trans 'Altersgruppe filtern' %}" class="border border-gray-300 rounded-md px-3 py-2 text-sm"
            hx-get="{% url 'core:client_list' %}"
            hx-trigger="change"
            hx-target="#client-table"
            hx-include="[name='q'],[name='stage']">
        <option value="">{% trans "Alle Altersgruppen" %}</option>
        {% for value, label in age_clusters %}
        <option value="{{ value }}" {% if value == selected_age %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
    </select>
</div>

<div id="client-table">
    {% include "core/clients/partials/table.html" %}
</div>
{% endblock %}
