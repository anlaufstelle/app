{% extends "base.html" %}
{% load i18n static %}

{% block title %}{% trans "Offline-Ansicht" %} – Anlaufstelle{% endblock %}

{% block content %}
<div x-data="offlineClientView" data-pk="{{ client_pk }}" x-init="load"
     data-testid="offline-client-view">

    <div class="mb-4 flex items-center space-x-2">
        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800">
            {% trans "Offline-Ansicht" %}
        </span>
        <span x-show="lastSynced" x-cloak class="text-xs text-ink-muted" data-testid="offline-last-synced">
            {% trans "Synchronisiert:" %} <span x-text="lastSyncedRel"></span>
        </span>
    </div>

    <template x-if="loading">
        <div class="py-8 text-center text-ink-muted" data-testid="offline-loading">
            {% trans "Lade Offline-Daten..." %}
        </div>
    </template>

    <template x-if="showUnavailable">
        <div class="bg-yellow-50 border border-yellow-200 rounded-[10px] p-4" data-testid="offline-not-available">
            <p class="text-sm text-yellow-900">
                {% trans "Diese Person wurde nicht für die Offline-Nutzung vorbereitet oder der lokale Cache ist leer." %}
            </p>
            <a href="/clients/{{ client_pk }}/" class="mt-2 inline-flex items-center text-sm text-accent hover:underline">
                {% trans "Online öffnen" %}
            </a>
        </div>
    </template>

    <template x-if="showAvailable">
        <div>
            <div class="mb-6">
                <h1 class="text-[22px] font-bold text-ink" x-text="data.client.pseudonym" data-testid="offline-pseudonym"></h1>
                <div class="mt-1 flex items-center space-x-3">
                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800"
                          x-text="data.client.contact_stage_display"></span>
                    <span class="text-sm text-ink-muted" x-text="data.client.age_cluster_display"></span>
                </div>
            </div>

            <template x-if="data.client.notes">
                <div class="bg-surface border border-subtle rounded-[10px] p-4 mb-5">
                    <h2 class="text-[12px] font-bold uppercase tracking-wider text-ink-muted mb-2">{% trans "Notizen" %}</h2>
                    <p class="text-sm text-ink-soft whitespace-pre-wrap" x-text="data.client.notes"></p>
                </div>
            </template>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2">
                    <h2 class="text-[12px] font-bold uppercase tracking-wider text-ink-muted mb-3">
                        {% trans "Kontakt-Chronik" %}
                    </h2>
                    <template x-if="noEvents">
                        <p class="text-sm text-ink-muted py-4">{% trans "Noch keine Kontakte dokumentiert." %}</p>
                    </template>
                    <div class="space-y-2" x-show="hasEvents">
                        <template x-for="event in data.events" :key="event.pk">
                            <div class="block bg-surface border border-subtle rounded-[10px] p-4" data-testid="offline-event">
                                <div class="flex items-center justify-between">
                                    <div class="flex items-center space-x-3">
                                        <span class="text-sm text-ink-muted font-mono" x-text="event.occurred_at_fmt"></span>
                                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-accent-light text-accent"
                                              x-text="event.document_type_name"></span>
                                        <template x-if="event.is_unsynced">
                                            <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800" data-testid="event-unsynced-badge">
                                                {% trans "Nicht synchronisiert" %}
                                            </span>
                                        </template>
                                        <template x-if="event.is_conflict">
                                            <a :href="'/offline/conflicts/' + event.pk + '/'"
                                               class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800 hover:bg-red-200"
                                               data-testid="event-conflict-badge">
                                                {% trans "Konflikt" %}
                                            </a>
                                        </template>
                                    </div>
                                    <span class="text-xs text-ink-muted" x-text="event.created_by_display"></span>
                                </div>
                                <template x-if="event.has_data_fields">
                                    <dl class="mt-2 text-sm text-ink-soft space-y-1">
                                        <template x-for="pair in event.data_fields_pairs" :key="pair.slug">
                                            <div class="flex">
                                                <dt class="w-32 text-xs text-ink-muted" x-text="pair.slug"></dt>
                                                <dd class="flex-1" x-text="pair.value_fmt"></dd>
                                            </div>
                                        </template>
                                    </dl>
                                </template>
                            </div>
                        </template>
                    </div>
                </div>

                <div>
                    <h2 class="text-[12px] font-bold uppercase tracking-wider text-ink-muted mb-3">{% trans "Fälle" %}</h2>
                    <template x-if="noCases">
                        <p class="text-sm text-ink-muted">{% trans "Keine Fälle" %}</p>
                    </template>
                    <div class="space-y-2" x-show="hasCases">
                        <template x-for="caseRec in data.cases" :key="caseRec.pk">
                            <div class="block bg-surface border border-subtle rounded-[10px] p-3">
                                <div class="flex items-center justify-between">
                                    <span class="text-sm font-medium" x-text="caseRec.title"></span>
                                    <span class="text-xs text-ink-muted" x-text="caseRec.status_display"></span>
                                </div>
                            </div>
                        </template>
                    </div>

                    <h2 class="text-[12px] font-bold uppercase tracking-wider text-ink-muted mb-3 mt-6">{% trans "Aufgaben" %}</h2>
                    <template x-if="noWorkitems">
                        <p class="text-sm text-ink-muted">{% trans "Keine offenen Aufgaben" %}</p>
                    </template>
                    <div class="space-y-2" x-show="hasWorkitems">
                        <template x-for="wi in data.workitems" :key="wi.pk">
                            <div class="block bg-surface border border-subtle rounded-[10px] p-3">
                                <span class="text-sm font-medium" x-text="wi.title"></span>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </template>
</div>

{% endblock %}

{% block extra_js %}
{# Ausgelagert wegen CSP (Refs #618). #}
<script src="{% static 'js/offline-client-view.js' %}"></script>
{% endblock %}
