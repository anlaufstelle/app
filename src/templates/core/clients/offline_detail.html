{% extends "base.html" %}
{% load i18n static %}

{% block title %}{% trans "Offline-Ansicht" %} – Anlaufstelle{% endblock %}

{% block content %}
<div x-data="offlineClientView" data-pk="{{ client_pk }}" x-init="load"
     data-testid="offline-client-view"
     data-dead-reason-not-found="{% trans 'Wurde auf dem Server gelöscht oder der Zugriff wurde entzogen' %}"
     data-dead-reason-invalid="{% trans 'Vom Server als ungültig abgelehnt' %}"
     data-dead-reason-forbidden="{% trans 'Keine Berechtigung' %}"
     data-dead-reason-unexpected-response="{% trans 'Unerwartete Server-Antwort' %}">

    <div class="mb-4 flex items-center space-x-2">
        <span class="badge bg-yellow-100 text-yellow-800">
            {% trans "Offline-Ansicht" %}
        </span>
        <span x-show="lastSynced" x-cloak class="text-xs text-ink-muted" data-testid="offline-last-synced">
            {% trans "Synchronisiert:" %} <span x-text="lastSyncedRel"></span>
        </span>
    </div>

    <template x-if="loading">
        <div class="py-8 text-center text-ink-muted" data-testid="offline-loading">
            {% trans "Lade Offline-Daten..." %}
        </div>
    </template>

    <template x-if="showUnavailable">
        <div class="bg-yellow-50 border border-yellow-200 rounded-[10px] p-4" data-testid="offline-not-available">
            <p class="text-sm text-yellow-900">
                {% trans "Diese Person wurde nicht für die Offline-Nutzung vorbereitet oder der lokale Cache ist leer." %}
            </p>
            <a href="/clients/{{ client_pk }}/" class="mt-2 inline-flex items-center text-sm text-accent hover:underline">
                {% trans "Online öffnen" %}
            </a>
        </div>
    </template>

    <template x-if="showAvailable">
        <div>
            {# Offline-Edit-Sync-Status (Refs #1111) #}
            <template x-if="showSynced">
                <div class="mb-4 bg-green-50 border border-green-200 rounded-[10px] p-3" data-testid="offline-edit-synced">
                    <p class="text-sm text-green-900">{% trans "Änderung synchronisiert." %}</p>
                </div>
            </template>
            <template x-if="showPending">
                <div class="mb-4 bg-yellow-50 border border-yellow-200 rounded-[10px] p-3" data-testid="offline-edit-pending">
                    <p class="text-sm text-yellow-900">{% trans "Offline gespeichert – wird beim nächsten Online-Kontakt synchronisiert." %}</p>
                </div>
            </template>
            <template x-if="showConflictNotice">
                <div class="mb-4 bg-red-50 border border-red-200 rounded-[10px] p-3" data-testid="offline-edit-conflict">
                    <p class="text-sm text-red-900">
                        {% trans "Konflikt beim Synchronisieren." %}
                        <a :href="conflictHref" class="font-medium text-accent hover:underline" data-testid="offline-edit-conflict-link">{% trans "Konflikt prüfen" %}</a>
                    </p>
                </div>
            </template>
            {# Refs #1111: Server-Validierung fehlgeschlagen — Edit blieb erhalten, nicht still verworfen. #}
            <template x-if="showInvalid">
                <div class="mb-4 bg-red-50 border border-red-200 rounded-[10px] p-3" data-testid="offline-edit-invalid">
                    <p class="text-sm text-red-900">{% trans "Änderung nicht gespeichert – Eingabe ungültig:" %} <span x-text="editError"></span></p>
                </div>
            </template>
            {# Refs #1111: transienter Sync-Fehler — Änderung lokal behalten, später erneut versucht. #}
            <template x-if="showError">
                <div class="mb-4 bg-red-50 border border-red-200 rounded-[10px] p-3" data-testid="offline-edit-error">
                    <p class="text-sm text-red-900">{% trans "Synchronisierung fehlgeschlagen – Änderung wurde lokal behalten und wird später erneut versucht." %}</p>
                </div>
            </template>
            {# Refs #1351/#1385 (M8/Task 4): Server hat die Änderung abgelehnt (403) — kein transienter Fehler wie showError, eigener erklärender Text. Änderung bleibt lokal erhalten. #}
            <template x-if="showRevoked">
                <div class="mb-4 bg-red-50 border border-red-200 rounded-[10px] p-3" data-testid="offline-edit-revoked" role="status" aria-live="polite">
                    <p class="text-sm text-red-900">{% trans "Server hat die Änderung abgelehnt (keine Berechtigung oder abgelaufene Sitzung). Änderung wurde lokal behalten – bitte Berechtigung prüfen und erneut versuchen." %}</p>
                </div>
            </template>
            {# Refs #1351 (M1): dead (404/410) — Ziel serverseitig dauerhaft nicht gefunden, KEIN auto-retry (anders als showError). Eintrag bleibt erhalten, wird in der Konflikt-Liste manuell entschieden. #}
            <template x-if="showDead">
                <div class="mb-4 bg-red-50 border border-red-200 rounded-[10px] p-3" data-testid="offline-edit-dead" role="status" aria-live="polite">
                    <p class="text-sm text-red-900">
                        {% trans "Der Server hat den zugehörigen Eintrag nicht gefunden (gelöscht oder Zugriff entzogen). Die Änderung wurde lokal behalten und wird NICHT automatisch erneut versucht." %}
                        <a href="{% url 'core:offline_conflict_list' %}" class="font-medium text-accent hover:underline" data-testid="offline-edit-dead-link">{% trans "In der Konflikt-Liste ansehen" %}</a>
                    </p>
                </div>
            </template>

            <div class="mb-6">
                <h1 class="text-[22px] font-bold text-ink" x-text="data.client.pseudonym" data-testid="offline-pseudonym"></h1>
                <div class="mt-1 flex items-center space-x-3">
                    <span class="badge bg-green-100 text-green-800"
                          x-text="data.client.contact_stage_display"></span>
                    <span class="text-sm text-ink-muted" x-text="data.client.age_cluster_display"></span>
                </div>
            </div>

            <template x-if="data.client.notes">
                <div class="card p-4 mb-5">
                    <h2 class="text-[12px] font-bold uppercase tracking-wider text-ink-muted mb-2">{% trans "Notizen" %}</h2>
                    <p class="text-sm text-ink-soft whitespace-pre-wrap" x-text="data.client.notes"></p>
                </div>
            </template>

            {# Refs #1323: Offline einen neuen Kontakt/ein neues Ereignis erfassen (Felder aus dem Bundle). #}
            <div class="mb-6" data-testid="offline-create">
                <template x-if="!creating">
                    <button type="button" @click="startCreate" x-show="hasDocumentTypes"
                            class="inline-flex items-center gap-1.5 btn-primary px-3.5 py-2"
                            data-testid="offline-new-event-btn">
                        <svg aria-hidden="true" class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
                        {% trans "Neuer Kontakt" %}
                    </button>
                </template>
                <template x-if="creating">
                    <form class="card p-4 space-y-3" @submit.prevent="saveCreate" data-testid="offline-create-form">
                        <h2 class="text-[12px] font-bold uppercase tracking-wider text-ink-muted">{% trans "Neuer Kontakt (offline)" %}</h2>
                        <div>
                            <label class="block text-xs font-medium text-ink-soft mb-1">{% trans "Dokumentationstyp" %}</label>
                            <select x-model="createDocTypePk" @change="onCreateDocTypeChange"
                                    class="w-full rounded-md border-subtle text-sm" data-testid="offline-create-doctype">
                                <option value="">{% trans "– bitte wählen –" %}</option>
                                <template x-for="opt in documentTypeOptions" :key="opt.value">
                                    <option :value="opt.value" x-text="opt.label"></option>
                                </template>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-ink-soft mb-1">{% trans "Zeitpunkt" %}</label>
                            <input type="datetime-local" x-model="createOccurredAt"
                                   class="w-full rounded-md border-subtle text-sm" data-testid="offline-create-occurred-at">
                        </div>
                        <template x-if="hasCaseOptions">
                            <div>
                                <label class="block text-xs font-medium text-ink-soft mb-1">{% trans "Fall (optional)" %}</label>
                                <select x-model="createCasePk"
                                        class="w-full rounded-md border-subtle text-sm" data-testid="offline-create-case">
                                    <option value="">{% trans "– kein Fall –" %}</option>
                                    <template x-for="opt in caseOptions" :key="opt.value">
                                        <option :value="opt.value" x-text="opt.label"></option>
                                    </template>
                                </select>
                            </div>
                        </template>

                        <template x-for="field in editFields" :key="field.slug">
                            <div>
                                <label class="block text-xs font-medium text-ink-soft mb-1">
                                    <span x-text="field.name"></span><template x-if="field.isRequired"><span> *</span></template>
                                </label>
                                <template x-if="field.isFile">
                                    <p class="text-xs text-ink-muted italic">{% trans "Datei offline nicht erfassbar — später nachreichen." %}</p>
                                </template>
                                <template x-if="field.isPlainInput">
                                    <input :type="field.inputType" x-model="editValues[field.slug]" :required="field.isRequired"
                                           class="w-full rounded-md border-subtle text-sm" :data-testid="'offline-create-input-' + field.slug">
                                </template>
                                <template x-if="field.isTextarea">
                                    <textarea x-model="editValues[field.slug]" :required="field.isRequired" rows="3"
                                              class="w-full rounded-md border-subtle text-sm" :data-testid="'offline-create-input-' + field.slug"></textarea>
                                </template>
                                <template x-if="field.isBoolean">
                                    <input type="checkbox" x-model="editValues[field.slug]"
                                           class="rounded border-subtle text-accent" :data-testid="'offline-create-input-' + field.slug">
                                </template>
                                <template x-if="field.isSelect">
                                    <select x-model="editValues[field.slug]" :required="field.isRequired"
                                            class="w-full rounded-md border-subtle text-sm" :data-testid="'offline-create-input-' + field.slug">
                                        <option value="">---------</option>
                                        <template x-for="opt in field.options" :key="opt.value">
                                            <option :value="opt.value" x-text="opt.label"></option>
                                        </template>
                                    </select>
                                </template>
                                <template x-if="field.isMultiSelect">
                                    <select multiple x-model="editValues[field.slug]"
                                            class="w-full rounded-md border-subtle text-sm" :data-testid="'offline-create-input-' + field.slug">
                                        <template x-for="opt in field.options" :key="opt.value">
                                            <option :value="opt.value" x-text="opt.label"></option>
                                        </template>
                                    </select>
                                </template>
                                <template x-if="field.helpText">
                                    <p class="mt-1 text-xs text-ink-muted" x-text="field.helpText"></p>
                                </template>
                            </div>
                        </template>

                        <template x-if="editError">
                            <p class="text-sm text-red-600" x-text="editError" data-testid="offline-create-error"></p>
                        </template>

                        <div class="flex gap-2">
                            <button type="submit" :disabled="saving"
                                    class="px-3 py-1.5 bg-accent text-white text-sm font-medium rounded-md hover:bg-accent disabled:opacity-60"
                                    data-testid="offline-create-save">
                                {% trans "Speichern" %}
                            </button>
                            <button type="button" @click="cancelCreate"
                                    class="px-3 py-1.5 border border-subtle text-sm rounded-md hover:bg-canvas"
                                    data-testid="offline-create-cancel">
                                {% trans "Abbrechen" %}
                            </button>
                        </div>
                    </form>
                </template>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2">
                    <h2 class="text-[12px] font-bold uppercase tracking-wider text-ink-muted mb-3">
                        {% trans "Kontakt-Chronik" %}
                    </h2>
                    <template x-if="noEvents">
                        <p class="text-sm text-ink-muted py-4">{% trans "Noch keine Kontakte dokumentiert." %}</p>
                    </template>
                    <div class="space-y-2" x-show="hasEvents">
                        <template x-for="event in data.events" :key="event.pk">
                            <div class="block card p-4" data-testid="offline-event">
                                <div class="flex items-center justify-between">
                                    <div class="flex items-center space-x-3">
                                        <span class="text-sm text-ink-muted font-mono" x-text="event.occurred_at_fmt"></span>
                                        <span class="badge bg-accent-light text-accent"
                                              x-text="event.document_type_name"></span>
                                        <template x-if="event.is_unsynced">
                                            <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800" data-testid="event-unsynced-badge">
                                                {% trans "Nicht synchronisiert" %}
                                            </span>
                                        </template>
                                        <template x-if="event.is_conflict">
                                            <a :href="'/offline/conflicts/' + event.pk + '/'"
                                               class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800 hover:bg-red-200"
                                               data-testid="event-conflict-badge">
                                                {% trans "Konflikt" %}
                                            </a>
                                        </template>
                                        {# Refs #1351/#1385 (M8/Task 4): permanent fehlgeschlagener Replay (Task 2/#1384) — Aktionen (Retry/Verwerfen/Export) leben in der Konflikt-Übersicht, hier nur ein informativer Badge mit Link dorthin. #}
                                        <template x-if="event.is_dead">
                                            <a href="{% url 'core:offline_conflict_list' %}"
                                               class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800 hover:bg-gray-200"
                                               :title="event.dead_reason_text"
                                               data-testid="event-dead-badge">
                                                {% trans "Nicht übertragbar" %}
                                            </a>
                                        </template>
                                    </div>
                                    <div class="flex items-center space-x-3">
                                        <span class="text-xs text-ink-muted" x-text="event.created_by_display"></span>
                                        {# Offline-Edit-Einstieg (Refs #1111): nur wo der Replay durchginge; event.can_edit_ui in load() vorberechnet (CSP-Guard verbietet Method-Calls in x-if). #}
                                        <template x-if="event.can_edit_ui">
                                            <button type="button" @click="startEdit(event)"
                                                    class="text-xs text-accent hover:underline"
                                                    :data-testid="'offline-edit-btn-' + event.pk">
                                                {% trans "Bearbeiten" %}
                                            </button>
                                        </template>
                                    </div>
                                </div>
                                <template x-if="event.has_data_fields">
                                    <dl class="mt-2 text-sm text-ink-soft space-y-1">
                                        <template x-for="pair in event.data_fields_pairs" :key="pair.slug">
                                            <div class="flex">
                                                <dt class="w-32 text-xs text-ink-muted" x-text="pair.slug"></dt>
                                                <dd class="flex-1" x-text="pair.value_fmt"></dd>
                                            </div>
                                        </template>
                                    </dl>
                                </template>

                                {# Inline-Edit-Formular (Refs #1111): Felder/Werte aus dem Offline-Bundle; Absenden → markEventModified → Offline-Queue → Replay bei Reconnect; event.editing via _setEditing(). #}
                                <template x-if="event.editing">
                                    <form class="mt-3 border-t border-subtle pt-3 space-y-3"
                                          @submit.prevent="saveEdit(event)" data-testid="offline-edit-form">
                                        <template x-for="field in editFields" :key="field.slug">
                                            <div>
                                                <label class="block text-xs font-medium text-ink-soft mb-1">
                                                    <span x-text="field.name"></span><template x-if="field.isRequired"><span> *</span></template>
                                                </label>

                                                <template x-if="field.isFile">
                                                    <p class="text-xs text-ink-muted italic" x-text="field.fileNote"></p>
                                                </template>
                                                <template x-if="field.isPlainInput">
                                                    <input :type="field.inputType" x-model="editValues[field.slug]"
                                                           :required="field.isRequired"
                                                           class="w-full rounded-md border-subtle text-sm"
                                                           :data-testid="'offline-edit-input-' + field.slug">
                                                </template>
                                                <template x-if="field.isTextarea">
                                                    <textarea x-model="editValues[field.slug]" :required="field.isRequired" rows="3"
                                                              class="w-full rounded-md border-subtle text-sm"
                                                              :data-testid="'offline-edit-input-' + field.slug"></textarea>
                                                </template>
                                                <template x-if="field.isBoolean">
                                                    <input type="checkbox" x-model="editValues[field.slug]"
                                                           class="rounded border-subtle text-accent"
                                                           :data-testid="'offline-edit-input-' + field.slug">
                                                </template>
                                                <template x-if="field.isSelect">
                                                    <select x-model="editValues[field.slug]" :required="field.isRequired"
                                                            class="w-full rounded-md border-subtle text-sm"
                                                            :data-testid="'offline-edit-input-' + field.slug">
                                                        <option value="">---------</option>
                                                        <template x-for="opt in field.options" :key="opt.value">
                                                            <option :value="opt.value" x-text="opt.label"></option>
                                                        </template>
                                                    </select>
                                                </template>
                                                <template x-if="field.isMultiSelect">
                                                    <select multiple x-model="editValues[field.slug]"
                                                            class="w-full rounded-md border-subtle text-sm"
                                                            :data-testid="'offline-edit-input-' + field.slug">
                                                        <template x-for="opt in field.options" :key="opt.value">
                                                            <option :value="opt.value" x-text="opt.label"></option>
                                                        </template>
                                                    </select>
                                                </template>

                                                <template x-if="field.helpText">
                                                    <p class="mt-1 text-xs text-ink-muted" x-text="field.helpText"></p>
                                                </template>
                                            </div>
                                        </template>

                                        <template x-if="editError">
                                            <p class="text-sm text-red-600" x-text="editError" data-testid="offline-edit-error"></p>
                                        </template>

                                        <div class="flex gap-2">
                                            <button type="submit" :disabled="saving"
                                                    class="px-3 py-1.5 bg-accent text-white text-sm font-medium rounded-md hover:bg-accent disabled:opacity-60"
                                                    data-testid="offline-edit-save">
                                                {% trans "Speichern" %}
                                            </button>
                                            <button type="button" @click="cancelEdit"
                                                    class="px-3 py-1.5 border border-subtle text-sm rounded-md hover:bg-canvas"
                                                    data-testid="offline-edit-cancel">
                                                {% trans "Abbrechen" %}
                                            </button>
                                        </div>
                                    </form>
                                </template>
                            </div>
                        </template>
                    </div>
                </div>

                <div>
                    <h2 class="text-[12px] font-bold uppercase tracking-wider text-ink-muted mb-3">{% trans "Fälle" %}</h2>
                    <template x-if="noCases">
                        <p class="text-sm text-ink-muted">{% trans "Keine Fälle" %}</p>
                    </template>
                    <div class="space-y-2" x-show="hasCases">
                        <template x-for="caseRec in data.cases" :key="caseRec.pk">
                            <div class="block bg-surface border border-subtle rounded-[10px] p-3">
                                <div class="flex items-center justify-between">
                                    <span class="text-sm font-medium" x-text="caseRec.title"></span>
                                    <span class="text-xs text-ink-muted" x-text="caseRec.status_display"></span>
                                </div>
                            </div>
                        </template>
                    </div>

                    <h2 class="text-[12px] font-bold uppercase tracking-wider text-ink-muted mb-3 mt-6">{% trans "Aufgaben" %}</h2>
                    <template x-if="noWorkitems">
                        <p class="text-sm text-ink-muted">{% trans "Keine offenen Aufgaben" %}</p>
                    </template>
                    <div class="space-y-2" x-show="hasWorkitems">
                        <template x-for="wi in data.workitems" :key="wi.pk">
                            <div class="block bg-surface border border-subtle rounded-[10px] p-3">
                                <span class="text-sm font-medium" x-text="wi.title"></span>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </template>
</div>

{% endblock %}

{% block extra_js %}
{# Ausgelagert wegen CSP (Refs #618). #}
<script src="{% static 'js/offline-client-view.js' %}"></script>
{% endblock %}
