{% load i18n %}
{# Sub-Navigation des /system/-Bereichs. Refs #867. #}
<nav class="mb-6 flex flex-wrap gap-2 text-[13px]" aria-label="{% trans 'Systembereich-Navigation' %}">

       class="px-3 py-1.5 rounded-md font-medium {% if request.resolver_match.url_name == 'system_dashboard' %}bg-accent text-white{% else %}bg-surface border border-subtle text-ink-soft hover:bg-canvas{% endif %}">
        {% trans "Übersicht" %}
    </a>
    <a href="{% url 'core:system_organization' %}"
       class="px-3 py-1.5 rounded-md font-medium {% if request.resolver_match.url_name == 'system_organization' %}bg-accent text-white{% else %}bg-surface border border-subtle text-ink-soft hover:bg-canvas{% endif %}">
        {% trans "Organisation" %}

       class="px-3 py-1.5 rounded-md font-medium {% if request.resolver_match.url_name == 'system_audit_list' or request.resolver_match.url_name == 'system_audit_detail' %}bg-accent text-white{% else %}bg-surface border border-subtle text-ink-soft hover:bg-canvas{% endif %}">
        {% trans "Audit-Log" %}
