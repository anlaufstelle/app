{% load i18n %}

{# Zeitraum-Auswahl (Pills) #}
<div class="mb-6 flex flex-wrap gap-2 items-end no-print">
    <div class="flex gap-1.5">
        <button hx-get="{% url 'core:statistics' %}?period=month"
                hx-target="#statistics-content"
                hx-push-url="true"
                class="inline-flex items-center px-3 py-1 rounded-full text-[12px] font-medium border {% if period == 'month' %}bg-accent text-white border-accent font-semibold{% else %}bg-surface text-ink-muted border-subtle hover:bg-canvas{% endif %}">
            {% trans "Monat" %}
        </button>
        <button hx-get="{% url 'core:statistics' %}?period=quarter"
                hx-target="#statistics-content"
                hx-push-url="true"
                class="inline-flex items-center px-3 py-1 rounded-full text-[12px] font-medium border {% if period == 'quarter' %}bg-accent text-white border-accent font-semibold{% else %}bg-surface text-ink-muted border-subtle hover:bg-canvas{% endif %}">
            {% trans "Quartal" %}
        </button>
        <button hx-get="{% url 'core:statistics' %}?period=half"
                hx-target="#statistics-content"
                hx-push-url="true"
                class="inline-flex items-center px-3 py-1 rounded-full text-[12px] font-medium border {% if period == 'half' %}bg-accent text-white border-accent font-semibold{% else %}bg-surface text-ink-muted border-subtle hover:bg-canvas{% endif %}">
            {% trans "Halbjahr" %}
        </button>
        <button hx-get="{% url 'core:statistics' %}?period=year"
                hx-target="#statistics-content"
                hx-push-url="true"
                class="inline-flex items-center px-3 py-1 rounded-full text-[12px] font-medium border {% if period == 'year' %}bg-accent text-white border-accent font-semibold{% else %}bg-surface text-ink-muted border-subtle hover:bg-canvas{% endif %}">
            {% trans "Jahr" %}
        </button>
    </div>
    <form class="flex gap-2 items-end ml-4">
        <input type="hidden" name="period" value="custom">
        <div>
            <label class="block text-[11px] font-bold uppercase tracking-wider text-ink-muted mb-1">{% trans "Von" %}</label>
            <input type="date" name="date_from" value="{{ date_from|date:'Y-m-d' }}"
                   class="bg-surface border border-subtle rounded-[10px] px-2.5 py-1.5 text-[13px] text-ink">
        </div>
        <div>
            <label class="block text-[11px] font-bold uppercase tracking-wider text-ink-muted mb-1">{% trans "Bis" %}</label>
            <input type="date" name="date_to" value="{{ date_to|date:'Y-m-d' }}"
                   class="bg-surface border border-subtle rounded-[10px] px-2.5 py-1.5 text-[13px] text-ink">
        </div>
        <button type="submit"
                hx-get="{% url 'core:statistics' %}"
                hx-target="#statistics-content"
                hx-include="closest form"
                hx-push-url="true"
                class="inline-flex items-center bg-surface border border-subtle text-ink-soft text-[13px] font-medium rounded-md px-3.5 py-1.5 hover:bg-canvas">
            {% trans "Anwenden" %}
        </button>
    </form>
</div>

{% if period == "year" and selected_year %}
<div class="mb-4 flex items-center gap-3 no-print">
    <button hx-get="{% url 'core:statistics' %}?period=year&year={{ selected_year|add:'-1' }}"
            hx-target="#statistics-content"
            hx-push-url="true"
            class="p-1.5 bg-surface border border-subtle rounded-[10px] text-ink-muted hover:text-ink"
            aria-label="{% trans 'Vorheriges Jahr' %}">
        <svg aria-hidden="true" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
    </button>
    <span class="font-mono font-semibold text-[15px] text-ink">{{ selected_year }}</span>
    {% if selected_year < current_year %}
    <button hx-get="{% url 'core:statistics' %}?period=year&year={{ selected_year|add:'1' }}"
            hx-target="#statistics-content"
            hx-push-url="true"
            class="p-1.5 bg-surface border border-subtle rounded-[10px] text-ink-muted hover:text-ink"
            aria-label="{% trans 'Nächstes Jahr' %}">
        <svg aria-hidden="true" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
        </svg>
    </button>
    {% endif %}
</div>
{% endif %}

<div id="dashboard-content">
    {% include "core/statistics/partials/dashboard_content.html" %}
</div>
