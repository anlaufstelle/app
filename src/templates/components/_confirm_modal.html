{% load i18n %}

{# Usage: wrap trigger element and include this template #}
{# Required context: confirm_title, confirm_message, confirm_action_url, confirm_button_text #}
<div x-data="{ open: false }">
    <div @click="open = true">
        {{ caller }}
    </div>
    <template x-teleport="body">
        <div x-show="open" x-cloak class="fixed inset-0 z-50 flex items-center justify-center" @keydown.escape.window="open = false">
            <div class="fixed inset-0 bg-black/50" @click="open = false"></div>
            <div class="relative bg-surface rounded-lg shadow-xl max-w-md w-full mx-4 p-6" @click.stop>
                <h3 class="text-lg font-semibold text-ink mb-2">{{ confirm_title }}</h3>
                <p class="text-sm text-ink-muted mb-6">{{ confirm_message }}</p>
                <div class="flex justify-end space-x-3">
                    <button @click="open = false" type="button" class="px-4 py-2 text-sm font-medium text-ink-soft bg-surface border border-subtle rounded-[10px] hover:bg-canvas">
                        {% trans "Abbrechen" %}
                    </button>
                    <form method="post" action="{{ confirm_action_url }}">
                        {% csrf_token %}
                        <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-red-600 rounded-md hover:bg-red-700">
                            {{ confirm_button_text }}
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </template>
</div>
