{% load i18n static %}
<!DOCTYPE html>
<html lang="de" class="h-full">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% trans "Passwort geändert" %} — Anlaufstelle</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body class="h-full bg-canvas flex items-center justify-center">
    <div class="w-full max-w-sm p-6 bg-surface rounded-lg shadow-md">
        <h1 class="text-2xl font-bold text-center text-accent mb-6">{% trans "Passwort geändert" %}</h1>

        <p class="text-sm text-ink-muted mb-4">
            {% trans "Ihr Passwort wurde erfolgreich geändert. Sie können sich jetzt mit Ihrem neuen Passwort anmelden." %}
        </p>

        <div class="text-center mt-4">
            <a href="{% url 'login' %}"
                class="w-full inline-flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-accent hover:bg-accent focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-accent min-h-[44px]">
                {% trans "Zur Anmeldung" %}
            </a>
        </div>
    </div>
</body>
</html>
