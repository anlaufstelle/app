# dev.anlaufstelle.app — Live-Dev-Deployment (Refs #671).
#
# Image-Quelle: ghcr.io/anlaufstelle/app:main, gebaut von
# .github/workflows/dev-image.yml auf jedem Push gegen main.
#
# Verwendung am Server (/opt/anlaufstelle):
#   docker compose -f docker-compose.dev.yml --env-file .env.dev pull
#   docker compose -f docker-compose.dev.yml --env-file .env.dev up -d
#
# .env.dev wird NICHT committed; Vorlage: .env.dev.example.

services:
  db:
    image: postgres:18-alpine@sha256:1b1689b20d16a014a3d195653381cf2caa75a41a92d93b255a9d6ea29fd353aa
    # Container-Runtime-Hardening (Refs #1374): kein Privilege-Escalation,
    # cap_drop ALL. Postgres startet als root (chmod/chown Datadir + Socket,
    # dann Drop auf postgres), daher CHOWN/FOWNER/SETUID/SETGID zurueck
    # (empirisch minimal; DAC_OVERRIDE nicht noetig). Kein read_only: Datadir
    # + Unix-Socket sind Schreibpfade.
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - SETUID
      - SETGID
    pids_limit: 512
    mem_limit: 2g
    # KEIN env_file: .env.dev hier — der db-Container nutzt
    # POSTGRES_USER=postgres als Bootstrap-Superuser (Postgres-Image-Convention).
    # Der App-User (anlaufstelle, NOSUPERUSER) wird im Init-Script angelegt.
    # Refs #671, ADR-017 § RLS-Pflicht.
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_BOOTSTRAP_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      APP_DB_USER: ${POSTGRES_USER}
      APP_DB_PASSWORD: ${POSTGRES_PASSWORD}
      ADMIN_DB_USER: ${POSTGRES_ADMIN_USER}
      ADMIN_DB_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
    volumes:
      # PG18-Image: PGDATA=/var/lib/postgresql/18/docker, VOLUME-Deklaration
      # /var/lib/postgresql — Mount aufs Elternverzeichnis, nicht .../data
      # (PG16-Layout), sonst landen die Daten in einem anonymen Volume.
      # Migrationspfad 16→18: docs/ops-runbook.md. Refs #1039.
      - pgdata_dev:/var/lib/postgresql
      - ./deploy/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  clamav:
    image: clamav/clamav:stable@sha256:6f4a9e7d616ffc8d1070200fe35ac860735fdd522161a1043f94856e6ee13c28
    # Container-Runtime-Hardening (Refs #1374): kein Privilege-Escalation,
    # cap_drop ALL. clamav startet als root und dropt auf den clamav-User;
    # CHOWN/FOWNER/SETUID/SETGID + DAC_OVERRIDE zurueck (ohne DAC_OVERRIDE
    # scheitert das Oeffnen von /var/log/clamav/*.log -> Init-Fehler, empirisch
    # belegt). Kein read_only: freshclam schreibt Signatur-Updates.
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    pids_limit: 512
    mem_limit: 3g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/usr/local/bin/clamdcheck.sh"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 5m
    networks:
      - internal

  web:
    image: ghcr.io/anlaufstelle/app:main
    pull_policy: always
    # Container-Runtime-Hardening (Refs #1374): kein Privilege-Escalation,
    # cap_drop ALL (web laeuft als non-root appuser auf :8000, braucht keine
    # Caps). read_only-Root-FS mit definiertem Schreib-Scratch: /tmp
    # (Django-Upload-Tempfiles > 2,5 MB + Gunicorn-Worker-Heartbeat) und
    # /app/staticfiles (Entrypoint-collectstatic + WhiteNoise-Manifest);
    # MEDIA_ROOT + BACKUP_DIR liegen auf beschreibbaren Mounts.
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      # mode 1777: der non-root appuser (uid 1000) muss das
      # Entrypoint-collectstatic-Manifest unter read_only schreiben koennen
      # (Docker-Default-tmpfs waere root:0755 -> Permission denied). Refs #1374.
      - /app/staticfiles:mode=1777
      # Gunicorn legt seinen Control-Server-Socket unter $HOME/.gunicorn ab;
      # unter read_only sonst "Read-only file system". Refs #1374.
      - /home/appuser/.gunicorn:mode=1777
      # WeasyPrint/fontconfig legt beim ersten PDF-Render seinen Cache unter
      # $HOME/.cache ab; unter read_only sonst "no writable cache directory"
      # (Fehler-Logs + langsamer Render). Refs #1374.
      - /home/appuser/.cache:mode=1777
    pids_limit: 512
    mem_limit: 2g
    env_file: .env.dev
    environment:
      DJANGO_SETTINGS_MODULE: anlaufstelle.settings.devlive
      # MEDIA_ROOT unter read_only aufs beschreibbare media-Volume (/data)
      # pinnen — sonst greift der Default BASE_DIR/media (=/app/media, jetzt
      # read-only) und Datei-Uploads scheitern mit HTTP 500. Refs #1374.
      MEDIA_ROOT: /data/media
      POSTGRES_HOST: db
      CLAMAV_HOST: clamav
      # Refs #1017: Stabiler App-Rollenname für check_db_roles (siehe prod-Compose).
      POSTGRES_APP_USER: ${POSTGRES_USER}
    volumes:
      - media_dev:/data
      # Refs #871: BACKUP_DIR aus .env.dev (Default /var/backups/anl) muss
      # fuer die Health-Card im /system/-Dashboard read-only erreichbar
      # sein, sonst zeigt der ``last_backup_info``-Check immer
      # "Kein Backup gefunden". Bind-Mount in denselben Pfad, damit
      # ``settings.BACKUP_DIR`` ohne Pfad-Mapping greift.
      - ${BACKUP_DIR:-/var/backups/anl}:${BACKUP_DIR:-/var/backups/anl}:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import urllib.request, json, sys;
          body = urllib.request.urlopen('http://localhost:8000/health/', timeout=5).read();
          sys.exit(0 if json.loads(body).get('status') == 'ok' else 1)
      interval: 30s
      timeout: 10s
      retries: 3
      # 6 min Grace: /health/ ist erst dann "ok", wenn ClamAV-DB syncronisiert
      # ist (Initial-Download dauert 3-5 min). Solange ist der Status
      # "degraded" und Container-Healthcheck wuerde sonst zu frueh failen
      # und Caddy's depends_on: service_healthy haengt.
      start_period: 6m
    restart: unless-stopped
    networks:
      - internal
      - frontend

  caddy:
    image: caddy:2-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
    # Container-Runtime-Hardening (Refs #1374): kein Privilege-Escalation,
    # cap_drop ALL bis auf NET_BIND_SERVICE (Bind auf 80/443; das Caddy-Binary
    # traegt cap_net_bind_service als File-Cap, die no-new-privileges sonst
    # beim exec blockt). read_only-Root-FS; beschreibbar via Volumes bleiben
    # /data, /config (Zertifikate/State) und /var/log/caddy (Access-Log).
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      # Caddys interne PKI/CA schreibt Truststore-Tempfiles nach /tmp; unter
      # read_only sonst "read-only file system". Refs #1374.
      - /tmp
    pids_limit: 256
    mem_limit: 512m
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - caddy_data_dev:/data
      - caddy_config_dev:/config
      # Access-Log-Volume: unter read_only muss /var/log/caddy beschreibbar
      # sein (Caddyfile.dev loggt dorthin). Refs #1374.
      - caddy_logs_dev:/var/log/caddy
    # KEIN env_file: .env.dev hier — Caddy braucht keine App-/DB-/Krypto-Secrets
    # (Blast-Radius). Nur die von Caddyfile.dev tatsaechlich referenzierten
    # Variablen als Passthrough. Refs #1370.
    environment:
      - ACME_EMAIL
      - DOMAIN
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend

volumes:
  pgdata_dev:
  caddy_data_dev:
  caddy_config_dev:
  caddy_logs_dev:
  media_dev:

networks:
  internal:
    internal: true
  frontend:
