# Dev-Compose — niemals auf einem oeffentlichen Server starten.
#
# Diese Datei nutzt triviale Default-Credentials (anlaufstelle/anlaufstelle/anlaufstelle)
# und stellt Ports zur lokalen Entwicklung bereit. Postgres ist deshalb explizit auf
# 127.0.0.1 gebunden, sonst wuerde ``docker compose up`` auf 0.0.0.0:5432 lauschen
# und die DB mit Trivialpasswort aus dem Internet erreichbar machen (Refs #799).
#
# Fuer den produktiven Einsatz bitte ``docker-compose.prod.yml`` verwenden.
services:
  db:
    image: postgres:18-alpine@sha256:1b1689b20d16a014a3d195653381cf2caa75a41a92d93b255a9d6ea29fd353aa
    environment:
      POSTGRES_DB: anlaufstelle
      POSTGRES_USER: anlaufstelle
      POSTGRES_PASSWORD: anlaufstelle
    ports:
      # Loopback-Binding — DB ist nur lokal erreichbar (Refs #799).
      - "127.0.0.1:5432:5432"
    volumes:
      # PG18-Image: PGDATA liegt unter /var/lib/postgresql/18/docker, das Image
      # deklariert VOLUME /var/lib/postgresql. Mount aufs Elternverzeichnis —
      # ein Mount auf .../data (PG16-Layout) liefe ins Leere und die Daten
      # landeten in einem anonymen Volume. Refs #1039.
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anlaufstelle"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./src:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: anlaufstelle.settings.dev
      POSTGRES_HOST: db
      POSTGRES_DB: anlaufstelle
      POSTGRES_USER: anlaufstelle
      POSTGRES_PASSWORD: anlaufstelle
    depends_on:
      db:
        condition: service_healthy

  tailwind:
    image: node:24-alpine@sha256:a0b9bf06e4e6193cf7a0f58816cc935ff8c2a908f81e6f1a95432d679c54fbfd
    working_dir: /app
    volumes:
      - .:/app
    command: npx @tailwindcss/cli -i src/static/css/input.css -o src/static/css/styles.css --watch
    profiles:
      - tailwind

  clamav:
    image: clamav/clamav:stable@sha256:6f4a9e7d616ffc8d1070200fe35ac860735fdd522161a1043f94856e6ee13c28
    volumes:
      - clamav-db:/var/lib/clamav
    # Port 3310 ist nur innerhalb des Compose-Netzwerks sichtbar — kein Host-Binding.
    # Aktivierung via CLAMAV_ENABLED=true im web-Container.
    # Refs #938: Healthcheck via clamdscan --version (Smoke-Test des Binary).
    # Der frühere clamdcheck.sh testet TCP 3310, aber clamd lauscht im
    # Image-Default nicht auf TCP — führte zu permanent unhealthy-Status,
    # obwohl clamd grundsätzlich funktioniert.
    healthcheck:
      test: ["CMD", "clamdscan", "--version"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 300s

volumes:
  pgdata:
  clamav-db:
